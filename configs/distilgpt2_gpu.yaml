# DistilGPT-2 GPU validation config — 82M params, fast GPU training
# Validates the full QLoRA pipeline on GPU before scaling to Mistral 7B

model:
  base_model: "distilgpt2"
  trust_remote_code: false
  torch_dtype: "bfloat16"

quantization:
  load_in_4bit: false  # Small model, no need for quantization on 10GB

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - "c_attn"
    - "c_proj"
    - "c_fc"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "adapters/distilgpt2_gpu"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-4
  warmup_steps: 10
  logging_steps: 5
  save_steps: 50
  eval_steps: 50
  evaluation_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  optim: "adamw_torch"
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  max_seq_length: 256
  packing: false

dataset:
  path: "data/medical/train.jsonl"
  eval_path: "data/medical/val.jsonl"
  text_column: "text"
  format: "jsonl"
