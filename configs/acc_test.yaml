# ACC validation config — uses the trained tiny_gpt2 adapter.
# Drives scripts/validate_acc.py to exercise EntropyMonitor / ACCEnhancedGenerator.

model:
  base_model: "sshleifer/tiny-gpt2"
  trust_remote_code: false
  torch_dtype: "float32"

adapter:
  path: "adapters/tiny_gpt2_general/final_adapter"

acc:
  threshold: 3.5            # nats, interpreted per `mode`
  mode: "absolute"          # absolute | moving_average | percentile
  action: "flag"            # flag | regenerate | warning
  window_size: 32
  warmup: 4
  regen_multiplier: 2.0     # logits boost on regeneration (equiv. lower temp)
  max_regenerations: 2
  self_consistency_candidates: 5
  self_consistency_threshold: 0.75

inference:
  temperature: 0.7
  top_p: 0.9
  max_new_tokens: 64

dataset:
  path: "data/medical/train.jsonl"
  eval_path: "data/medical/val.jsonl"
  test_path: "data/medical/test.jsonl"
  text_column: "text"
  format: "jsonl"

output:
  report_path: "results/acc_validation.json"
